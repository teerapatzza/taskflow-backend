# render.yaml — Deploy บน Render.com (ฟรี)
# Push ไฟล์นี้ขึ้น GitHub แล้ว import ที่ render.com

services:
  - type: web
    name: taskflow-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false        # กรอกเองใน Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
